server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback — any non-asset path serves index.html so refresh works on
    # every route the hub owns.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # No backend proxy here — the outer Caddy routes /regalgrid/api/* to the
    # existing app API. The hub SPA calls that URL directly, so there's
    # nothing for nginx to proxy.

    # Basic hardening.
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Gzip.
    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;
}
